<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Player character - simple pixel art style -->
  <!-- Head -->
  <rect x="5" y="1" width="6" height="5" fill="#ffcc99"/>
  <!-- Hair -->
  <rect x="5" y="0" width="6" height="2" fill="#4a3728"/>
  <!-- Eyes -->
  <rect x="6" y="3" width="1" height="1" fill="#333"/>
  <rect x="9" y="3" width="1" height="1" fill="#333"/>
  <!-- Body (blue tunic) -->
  <rect x="4" y="6" width="8" height="6" fill="#3a6ea5"/>
  <!-- Arms -->
  <rect x="2" y="6" width="2" height="4" fill="#3a6ea5"/>
  <rect x="12" y="6" width="2" height="4" fill="#3a6ea5"/>
  <!-- Hands -->
  <rect x="2" y="10" width="2" height="2" fill="#ffcc99"/>
  <rect x="12" y="10" width="2" height="2" fill="#ffcc99"/>
  <!-- Legs (dark pants) -->
  <rect x="5" y="12" width="2" height="4" fill="#2a2a4a"/>
  <rect x="9" y="12" width="2" height="4" fill="#2a2a4a"/>
</svg>